name: Update Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ITS_LOGIN: ${{ secrets.ITS_LOGIN }}
      ITS_PASSWORD: ${{ secrets.ITS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Verify ITS credentials
        run: |
          python - <<'PY'
          import os
          from onec_release_dates import collector

          if not os.getenv("ITS_LOGIN") or not os.getenv("ITS_PASSWORD"):
              raise SystemExit("Missing ITS_LOGIN or ITS_PASSWORD repository secret")
          if not collector.authenticated_opener():
              raise SystemExit("ITS authentication failed")
          print("its_authentication_ok=True")
          PY

      - uses: actions/cache@v4
        with:
          path: .cache
          key: its-news-cache-${{ github.run_id }}
          restore-keys: |
            its-news-cache-

      - name: Build release database and site
        run: onec-release-dates --incremental

      - name: Test
        run: python -m pytest -q

      - name: Commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports site
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Update release database"
            git push
          fi
