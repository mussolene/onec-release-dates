name: Update Data

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - uses: actions/cache@v4
        with:
          path: .cache
          key: its-news-cache-${{ github.run_id }}
          restore-keys: |
            its-news-cache-

      - name: Build release database and site
        run: onec-release-dates

      - name: Test
        run: python -m pytest -q

      - name: Commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports site
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Update release database"
            git push
          fi
